<div>
  <div class="topbar-title">Dashboard</div>
  <div class="topbar-breadcrumb">Back-Office › <span>{{ currentPage }}</span></div>
</div>
<div class="topbar-right">
  <div class="topbar-search">
    <i class="ri-search-line" style="color:var(--muted);font-size:.8rem;"></i>
    <input placeholder="Rechercher…" type="text">
  </div>
  <a routerLink="/admin/messages" class="topbar-btn">
    <i class="ri-notification-3-line"></i>
    <div class="notif-dot" *ngIf="(unreadCount$ | async) as count"></div>
  </a>
  <div class="topbar-btn"><i class="ri-flashlight-line"></i></div>
  <div class="topbar-time">{{ currentTime }}</div>
</div>
