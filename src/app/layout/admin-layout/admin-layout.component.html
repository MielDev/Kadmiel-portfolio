<div class="admin-layout">
  <app-admin-sidebar [class.open]="isSidebarOpen"></app-admin-sidebar>
  
  <div class="main">
    <app-admin-navbar></app-admin-navbar>
    
    <main class="admin-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

<!-- Custom cursor moved inside to inherit variables if needed and be on top -->
<div class="cur" #cur [style.display]="isMobile ? 'none' : 'block'"></div>
<div class="cur-ring" #curRing [style.display]="isMobile ? 'none' : 'block'"></div>

<!-- Mobile toggle -->
<button class="mob-toggle" (click)="toggleSidebar()">
  <span></span><span></span><span></span>
</button>
